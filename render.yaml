# render.yaml — single-service deploy for Orth_pedeon
# Flutter Web + FastAPI/Gunicorn served from one Render web service.

services:
  - type: web
    name: orthpedeon
    runtime: python

    # ── Python version ─────────────────────────────────────────────────────
    # Explicitly pin to 3.12.8 — avoids Render defaulting to 3.14 which
    # breaks pydantic-core (needs Rust/Cargo) and Pillow (no wheel yet).
    pythonVersion: "3.12"

    # ── Build: runs from repo root ──────────────────────────────────────────
    buildCommand: chmod +x scripts/build.sh && ./scripts/build.sh

    # ── Start: Gunicorn + UvicornWorker for async FastAPI ──────────────────
    startCommand: gunicorn -c backend/gunicorn.conf.py backend.app.main:app

    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orthpedeon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      # Force Render's Python environment to exactly 3.12.8
      - key: PYTHON_VERSION
        value: "3.12.8"

databases:
  - name: orthpedeon-db
    plan: free
    databaseName: orthpedeon
    user: orthpedeon
