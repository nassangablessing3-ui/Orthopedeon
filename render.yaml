# render.yaml — Orth_pedeon single-service deploy
# Flutter Web + FastAPI/Gunicorn served from one Render web service.

services:
  - type: web
    name: orthpedeon
    runtime: python
    pythonVersion: "3.12"

    # Runs from repo root
    buildCommand: chmod +x scripts/build.sh && ./scripts/build.sh

    # ── Start command ─────────────────────────────────────────────────────────
    # gunicorn.conf.py sets chdir=backend/ so `app.main:app` resolves correctly.
    # We pass the app as `app.main:app` (not backend.app.main:app) because
    # gunicorn.conf.py already changes the working directory to backend/.
    startCommand: gunicorn -c backend/gunicorn.conf.py app.main:app

    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orthpedeon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"

databases:
  - name: orthpedeon-db
    plan: free
    databaseName: orthpedeon
    user: orthpedeon
