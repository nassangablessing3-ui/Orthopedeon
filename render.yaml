# render.yaml — Orth_pedeon single-service deploy

services:
  - type: web
    name: orthpedeon
    runtime: python
    pythonVersion: "3.12"

    buildCommand: chmod +x scripts/build.sh && ./scripts/build.sh

    # All internal imports use backend.app.* — Render runs this from repo root.
    # gunicorn.conf.py handles worker class, port binding, and logging.
    startCommand: gunicorn -c backend/gunicorn.conf.py backend.app.main:app

    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orthpedeon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"

databases:
  - name: orthpedeon-db
    plan: free
    databaseName: orthpedeon
    user: orthpedeon
