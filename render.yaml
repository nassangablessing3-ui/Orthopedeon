# render.yaml — Orth_pedeon single-service deploy
# Flutter Web + FastAPI/Gunicorn from one Render web service, no Docker.

services:
  - type: web
    name: orthpedeon
    runtime: python
    pythonVersion: "3.12"        # Render major.minor selector

    # Runs from repo root
    buildCommand: chmod +x scripts/build.sh && ./scripts/build.sh

    # Gunicorn with UvicornWorker — required for FastAPI async support
    startCommand: gunicorn -c backend/gunicorn.conf.py backend.app.main:app

    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orthpedeon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false              # add manually in Render dashboard
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"         # exact patch — prevents Render defaulting to 3.14

databases:
  - name: orthpedeon-db
    plan: free
    databaseName: orthpedeon
    user: orthpedeon
