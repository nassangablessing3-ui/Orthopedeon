name: orthpedeon
description: AI-powered accessibility and wellbeing app for people with disabilities.
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <3.5.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── HTTP ───────────────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ── State management ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Storage ────────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.3

  # ── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^13.2.5

  # ── UI ─────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # ── Accessibility / AI ─────────────────────────────────────────────────────
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  image_picker: ^1.1.1
  permission_handler: 11.2.0

  # ── Notifications ──────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # ── Utils ──────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/app_icon.png
