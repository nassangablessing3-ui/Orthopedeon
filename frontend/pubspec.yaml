name: orthpedeon
description: AI-powered accessibility and wellbeing app for people with disabilities.
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage
  flutter_secure_storage: ^10.0.0-beta.4
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.5

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Accessibility / AI features
  speech_to_text: ^7.4.0
  flutter_tts: ^4.0.2
  image_picker: ^1.1.1
  permission_handler: ^11.4.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Uncomment if needed
  # build_runner: ^2.4.11
  # retrofit_generator: ^8.1.0
  # riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
