name: orthpedeon
description: AI-powered accessibility and wellbeing app for people with disabilities.
version: 1.0.0+1

environment:
  # Flutter 3.22.2 ships Dart 3.4.3. Upper bound <3.5.0 prevents pub from
  # resolving packages that require Dart 3.5+ (e.g. permission_handler 11.3.x)
  sdk: ">=3.4.0 <3.5.0"

dependencies:
  flutter:
    sdk: flutter

  # ── HTTP ───────────────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ── State management ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Storage ────────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.3

  # ── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^13.2.5

  # ── UI ─────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # ── Accessibility / AI ─────────────────────────────────────────────────────
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  image_picker: ^1.1.1
  # Hard-pinned — 11.3.x requires Dart >=3.5.0 which Flutter 3.22.2 does not ship
  permission_handler: 11.2.0

  # ── Notifications ──────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # ── Utils ──────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # No asset entries — assets folder only has .gitkeep placeholders.
  # Add real image/animation paths here when you add actual asset files.
