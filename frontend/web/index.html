<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder comment for the content of your index.html.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AI-powered accessibility and wellbeing platform for people with disabilities.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Orth_pedeon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Orth_pedeon</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #1A0B3B;
    }
    /* Loading screen shown while Flutter initialises */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(160deg, #1A0B3B 0%, #2D1463 60%, #5B2D8E 100%);
      font-family: sans-serif;
      color: rgba(255,255,255,0.7);
      gap: 20px;
    }
    #loading-logo {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    #loading-title {
      font-size: 24px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.3px;
    }
    #loading-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(200,168,248,0.3);
      border-top-color: #C8A8F8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading placeholder — hidden once Flutter renders -->
  <div id="loading">
    <div id="loading-logo">♿</div>
    <div id="loading-title">Orth_pedeon</div>
    <div id="loading-spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
